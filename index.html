<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Budget tracking app" />
    <meta name="theme-color" content="#0F766E" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Waldas Watch" />
    <link rel="icon" href="/favicon.png" type="image/png" />
    <link rel="icon" type="image/png" sizes="192x192" href="/pwa-icons/icon-192.png" />
    <link rel="apple-touch-icon" href="/pwa-icons/icon-192.png" />
    <title>Waldas Watch</title>
  </head>
  <body>
    <div id="splash">
      <img src="/pwa-icons/icon-512.png" alt="Waldas Watch" />
    </div>
    <style>
      #splash {
        position: fixed;
        inset: 0;
        z-index: 9999;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #fff;
        transition: opacity 0.35s ease;
      }
      #splash.fade-out {
        opacity: 0;
        pointer-events: none;
      }
      #splash img {
        width: 128px;
        height: 128px;
        animation: splash-bounce 1s ease-in-out infinite;
      }
      @keyframes splash-bounce {
        0%   { transform: scale(0.85) rotate(0deg); }
        50%  { transform: scale(1.15) rotate(180deg); }
        100% { transform: scale(0.85) rotate(360deg); }
      }
    </style>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
